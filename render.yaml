services:
  - type: web
    name: kaiten-mcp-server
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: KAITEN_HOST
        sync: false
      - key: KAITEN_TOKEN
        sync: false
      - key: OAUTH_CLIENT_ID
        sync: false
      - key: OAUTH_CLIENT_SECRET
        sync: false
      - key: OWNER_PASSWORD
        sync: false
      - key: OAUTH_REDIRECT_URIS
        sync: false
      - key: PORT
        value: 10000
